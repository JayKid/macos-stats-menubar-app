name: MacBarStats

options:
  bundleIdPrefix: dev.joselopez
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    PRODUCT_BUNDLE_IDENTIFIER: dev.joselopez.MacBarStats
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"               # ad-hoc; no Developer ID needed
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  MacBarStats:
    type: application
    platform: macOS
    sources:
      - path: MacBarStats
    info:
      path: MacBarStats/Info.plist
      properties:
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.utilities
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSHumanReadableCopyright: ""
    entitlements:
      path: MacBarStats/MacBarStats.entitlements
      properties:
        com.apple.security.app-sandbox: false
